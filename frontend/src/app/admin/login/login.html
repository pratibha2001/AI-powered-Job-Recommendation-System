<div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-500 via-indigo-600 to-purple-600 p-6">
  <form (ngSubmit)="handleLogin()" class="bg-white/90 backdrop-blur-lg p-10 rounded-2xl shadow-xl w-full max-w-md animate-fade-in">
    
    <!-- Title -->
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-gray-800">Admin Portal</h2>
      <p class="text-sm text-gray-500 mt-1">Secure Login for Admin Access</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-4 bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded">
      {{ errorMessage }}
    </div>

    <!-- Username Field -->
    <div class="mb-4">
      <label class="block text-gray-700 text-sm mb-1" for="username">Username</label>
      <div class="relative">
        <input
          type="text"
          id="username"
          name="username"
          [(ngModel)]="username"
          required
          class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-400"
          placeholder="Enter your username"
        />
        <span class="absolute inset-y-0 right-3 flex items-center text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A9 9 0 1112 21a9 9 0 01-6.879-3.196z"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- Password Field -->
    <div class="mb-6">
      <label class="block text-gray-700 text-sm mb-1" for="password">Password</label>
      <div class="relative">
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-400"
          placeholder="Enter your password"
        />
        <span class="absolute inset-y-0 right-3 flex items-center text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0-1.104.896-2 2-2s2 .896 2 2-2 2-2 2z M4 11c0-4.418 3.582-8 8-8s8 3.582 8 8a8 8 0 01-16 0z"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- Submit Button -->
    <button
      type="submit"
      class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md font-medium transition"
    >
      Login
    </button>
  </form>

  <!-- Spinner -->
  <ngx-spinner
    bdColor="rgba(0, 0, 0, 0.3)"
    size="medium"
    color="#fff"
    type="ball-spin-clockwise"
  ></ngx-spinner>
</div>
