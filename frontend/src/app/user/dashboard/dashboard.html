<div class="min-h-screen bg-gray-50 px-6 py-8">
  <!-- Header -->
  <header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-6 rounded-2xl shadow-lg mb-8">
    <h1 class="text-3xl font-bold">Welcome to Your Dashboard</h1>
    <p class="text-sm mt-1">Find jobs tailored to your resume – no login required.</p>
  </header>

  <!-- Main Content Grid -->
  <div class="grid md:grid-cols-3 gap-6">
    <!-- Resume Upload -->
    <section class="md:col-span-1 bg-white p-6 rounded-xl shadow-md">
      <h2 class="text-xl font-semibold mb-4 text-gray-700">Upload Resume</h2>
      <div class="border-dashed border-2 border-gray-300 rounded-lg p-6 text-center">
        <p class="text-sm text-gray-500 mb-2">Drag and drop your PDF resume here</p>
        <input type="file" accept=".pdf" class="block mx-auto mt-2" />
        <button class="mt-4 px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
          Upload & Match Jobs
        </button>
      </div>
    </section>

    <!-- Job Filters & Listings -->
    <section class="md:col-span-2 bg-white p-6 rounded-xl shadow-md">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-4">
        <h2 class="text-xl font-semibold text-gray-700">Recommended Jobs</h2>
        <!-- Filters -->
        <div class="flex flex-wrap gap-2 mt-3 md:mt-0">
          <select class="px-3 py-2 rounded-md border border-gray-300 text-sm">
            <option>Location</option>
            <option>Remote</option>
            <option>New York</option>
          </select>
          <select class="px-3 py-2 rounded-md border border-gray-300 text-sm">
            <option>Experience</option>
            <option>0-2 yrs</option>
            <option>3-5 yrs</option>
          </select>
          <select class="px-3 py-2 rounded-md border border-gray-300 text-sm">
            <option>Salary</option>
            <option>$50k-$70k</option>
            <option>$70k-$90k</option>
          </select>
        </div>
      </div>

      <!-- Job Cards -->
      <div class="grid gap-4 sm:grid-cols-2">
        <div class="p-5 bg-gray-50 border border-gray-200 rounded-lg hover:shadow-md transition">
          <h3 class="text-lg font-medium text-gray-800">Frontend Developer</h3>
          <p class="text-sm text-gray-600">Company: Acme Corp</p>
          <p class="text-sm text-gray-600">Location: Remote</p>
          <p class="text-sm text-gray-500 mt-2">Matched: 87%</p>
          <button class="mt-3 px-3 py-1 text-sm bg-indigo-500 text-white rounded hover:bg-indigo-600">
            View & Apply
          </button>
        </div>
        <div class="p-5 bg-gray-50 border border-gray-200 rounded-lg hover:shadow-md transition">
          <h3 class="text-lg font-medium text-gray-800">Backend Engineer</h3>
          <p class="text-sm text-gray-600">Company: DevTech</p>
          <p class="text-sm text-gray-600">Location: New York</p>
          <p class="text-sm text-gray-500 mt-2">Matched: 92%</p>
          <button class="mt-3 px-3 py-1 text-sm bg-indigo-500 text-white rounded hover:bg-indigo-600">
            View & Apply
          </button>
        </div>
      </div>
    </section>
  </div>
</div>
